services:
  chiaki:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chiaki
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - PULSE_SERVER=unix:/tmp/pulse-socket
      - QT_X11_NO_MITSHM=1
      - SDL_JOYSTICK_DISABLE_UDEV=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority:ro
      - /run/user/${UID:-1000}/pulse/native:/tmp/pulse-socket
      - ./data:/home/chiaki
      - /dev:/dev
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${INPUT_GID:-994}"
    user: "${UID:-1000}:${GID:-1000}"
    restart: "no"
